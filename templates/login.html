<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — WEX Theory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --border: #222222;
      --text: #ffffff;
      --text-muted: #666666;
      --btn-bg: #ffffff;
      --btn-text: #0a0a0a;
      --wrong: #ef4444;
      --correct: #22c55e;
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --bg-card: #f5f5f5;
      --border: #e0e0e0;
      --text: #0a0a0a;
      --text-muted: #666666;
      --btn-bg: #0a0a0a;
      --btn-text: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .auth-wrap {
      width: 100%;
      max-width: 400px;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      color: var(--text);
      text-decoration: none;
    }
    .logo-sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
    }
    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .card-sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 6px;
    }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 8px;
      width: 100%;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--text-muted); }
    input::placeholder { color: var(--text-muted); }
    .msg-box {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .msg-box.error {
      background: #1a0505;
      color: var(--wrong);
      border: 1px solid var(--wrong);
      display: block;
    }
    .msg-box.success {
      background: #052e16;
      color: var(--correct);
      border: 1px solid var(--correct);
      display: block;
    }
    .btn-primary {
      width: 100%;
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }
    .footer-link a {
      color: var(--text);
      text-decoration: underline;
    }
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
  <div class="auth-wrap">
    <div class="logo-wrap">
      <a href="/" class="logo">WEXTheory</a>
      <p class="logo-sub">Danish Driving Theory Practice</p>
    </div>
    <div class="card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your account</div>
      <div class="msg-box" id="msgBox"></div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn" onclick="handleLogin()">Sign In</button>
    </div>
    <div class="footer-link">
      Don't have an account? <a href="/register">Create one</a>
    </div>
    <div class="footer-link" style="margin-top:10px;">
      <a href="/test/1" style="color:var(--text-muted);text-decoration:none;font-size:0.82rem;">Try Test 1 free without signing in →</a>
    </div>
  </div>

  <script>
  (function(){
    const t = localStorage.getItem('wex-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  })();

  function toggleTheme() {
    const h = document.documentElement;
    const cur = h.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    h.setAttribute('data-theme', next);
    localStorage.setItem('wex-theme', next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  }

  function showMsg(msg, type) {
    const box = document.getElementById('msgBox');
    box.className = 'msg-box ' + type;
    box.textContent = msg;
  }

  async function handleLogin() {
    const btn = document.getElementById('btn');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showMsg('Please fill all fields', 'error'); return; }
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = data.redirect || '/dashboard';
      } else {
        showMsg(data.error || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch(e) {
      showMsg('Connection error', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
