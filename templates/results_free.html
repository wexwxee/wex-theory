<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starter Test Results - WEX Theory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=20260317-menufix">
  <style>
  .result-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }
  .result-card {
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    background: var(--bg-card);
    position: relative;
  }
  .result-card:hover { transform: translateY(-2px); opacity: 0.9; }
  .result-card.correct { border: 3px solid #22c55e; }
  .result-card.wrong { border: 3px solid #ef4444; }
  .result-card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #000;
  }
  .result-card .rc-num {
    position: absolute;
    bottom: 6px;
    left: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .result-card.correct .rc-num { background: #22c55e; color: #fff; }
  .result-card.wrong .rc-num { background: #ef4444; color: #fff; }
  .result-card .rc-icon {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 1rem;
    line-height: 1;
  }
  .answer-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 0.9rem;
    line-height: 1.4;
  }
  .answer-row.user-correct { background: rgba(34, 197, 94, 0.12); border: 2px solid #22c55e; color: inherit; }
  .answer-row.user-wrong { background: rgba(239, 68, 68, 0.12); border: 2px solid #ef4444; color: inherit; }
  .answer-row.missed-correct { background: transparent; border: 2px solid #22c55e; color: inherit; }
  .answer-row.neutral { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .badge-user, .badge-correct, .badge-wrong {
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-user { background: #3b82f6; }
  .badge-correct { background: #22c55e; }
  .badge-wrong { background: #ef4444; }
  .review-modal {
    max-width: 920px !important;
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .review-modal-head {
    position: sticky;
    top: 0;
    z-index: 2;
    padding: 18px 24px 14px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--bg-card) 96%, #fff 4%), var(--bg-card));
    border-bottom: 1px solid var(--border);
  }
  .review-modal-scroll {
    overflow-y: auto;
    padding: 24px 24px 0;
  }
  .review-status-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin: 0 0 16px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .review-status-copy {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .review-status-label {
    font-size: 0.76rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .review-status-label.correct { color: #22c55e; }
  .review-status-label.wrong { color: #ef4444; }
  .review-status-hint {
    color: var(--text-muted);
    font-size: 0.84rem;
  }
  .review-answer-badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .review-expl-box {
    display: none;
    margin-top: 18px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--bg-card) 90%, #fff 10%), var(--bg-card));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .review-expl-title {
    font-size: 0.74rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text);
    margin-bottom: 8px;
  }
  .review-modal-footer {
    position: sticky;
    bottom: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 24px calc(14px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(180deg, rgba(0,0,0,0), color-mix(in srgb, var(--bg-card) 97%, #fff 3%) 28%);
    border-top: 1px solid var(--border);
  }
  .review-footer-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  @media (max-width: 768px) {
    .result-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .review-modal-head,
    .review-modal-footer {
      padding-left: 16px;
      padding-right: 16px;
    }
    .review-modal-scroll {
      padding: 16px 16px 0;
    }
    .review-answer-badges {
      justify-content: flex-start;
    }
  }
  @media (max-width: 480px) {
    .result-grid { grid-template-columns: repeat(2, 1fr); }
    .review-modal-footer {
      flex-wrap: wrap;
    }
    .review-footer-center {
      width: 100%;
      order: -1;
    }
  }
  .tw {
    cursor: pointer;
    border-bottom: 1px dotted #9ca3af;
    border-radius: 2px;
    padding: 0 1px;
    transition: background 0.1s ease;
  }
  .tw:hover { background: rgba(254,249,195,0.3); }
  [data-theme="light"] .tw:hover { background: #fef9c3; }
  .word-popup {
    position: absolute;
    background: #1f2937;
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 9999;
    pointer-events: none;
    min-width: 120px;
    max-width: 280px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    line-height: 1.4;
  }
  .word-popup::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom: none;
    border-top-color: #1f2937;
  }
  .wp-orig { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
  .wp-tr { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .wp-load { font-size: 12px; color: #9ca3af; }
  .wp-context { font-size: 11px; color: #cbd5e1; margin-top: 6px; line-height: 1.35; }
  .wp-variants {
    border-top: 1px solid #374151;
    padding-top: 6px;
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .wp-v { font-size: 13px; color: #d1d5db; }
  </style>
</head>
<body data-is-authenticated="{% if user %}true{% else %}false{% endif %}">
<nav>
  <div class="nav-inner">
    <div class="nav-left">
      <a href="{% if user %}/dashboard{% else %}/{% endif %}" class="logo">WEXTheory</a>
    </div>
    <div class="nav-right">
      <button class="btn-ghost btn-sm" id="resultsTranslateBtn" title="Toggle Russian translation" style="padding:5px 10px;font-size:0.95rem;">RU</button>
      <button class="theme-btn" id="navThemeBtn">&#9728;&#65039;</button>
      {% if user %}
      <a href="/dashboard" class="btn-ghost btn-sm">Dashboard</a>
      <a href="/profile" class="btn-primary btn-sm">{{ user.name }}</a>
      {% else %}
      <a href="/login" class="btn-ghost btn-sm">Sign In</a>
      <a href="/register" class="btn-primary btn-sm">Create Account</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="page" id="resultsPage">
  <div style="text-align:center;padding:60px 0 20px;color:var(--text-muted);">Loading results...</div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/privacy">Privacy</a>
    </div>
    <div>&copy; 2026 WEXTheory</div>
  </div>
</footer>

<div class="modal-overlay" id="qModal">
  <div class="modal modal-wide review-modal">
    <div class="review-modal-head">
      <div class="modal-header" style="margin-bottom:0;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="font-size:0.82rem;color:var(--text-muted);" id="modalMeta">Question 1 of 15</span>
          <button class="btn-ghost btn-sm" id="modalTranslateBtn" title="Toggle Russian translation" style="padding:5px 10px;font-size:0.85rem;">RU</button>
        </div>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
    </div>
    <div class="review-modal-scroll">
      <div id="modalImgWrap" style="margin-bottom:16px;display:none;">
        <img id="modalImg" src="" alt="" style="width:100%;border-radius:8px;border:1px solid var(--border);max-height:300px;object-fit:cover;">
      </div>
      <div id="modalQuestion" style="font-size:1rem;font-weight:600;line-height:1.5;margin-bottom:16px;"></div>
      <div id="modalQuestionRu" style="display:none;font-size:0.9rem;color:#6b7280;font-style:italic;margin:-8px 0 16px;animation:fadeIn 0.25s ease both;"></div>
      <div id="modalStatusBanner" class="review-status-banner">
        <div class="review-status-copy">
          <span id="modalStatusLabel" class="review-status-label">Review</span>
          <span id="modalStatusHint" class="review-status-hint"></span>
        </div>
        <span id="modalStatusPill"></span>
      </div>
      <div id="modalAnswers" style="margin-bottom:16px;"></div>
      <div id="modalExplanation" class="review-expl-box">
        <div class="review-expl-title">Explanation</div>
        <div id="modalExplanationBody"></div>
        <div id="modalExplanationRu" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-style:italic;"></div>
      </div>
    </div>
    <div class="review-modal-footer">
      <button class="btn-ghost btn-sm" id="modalPrev">&#8592; Prev</button>
      <div class="review-footer-center">
        <span id="modalStatus" style="font-size:0.85rem;"></span>
      </div>
      <button class="btn-ghost btn-sm" id="modalNext">Next &#8594;</button>
    </div>
  </div>
</div>

<textarea id="resultsDataJson" hidden>[]</textarea>
<div id="resultsPageMeta" hidden data-score="0" data-total="15"></div>

<script src="/static/js/results-viewer.js"></script>
<script src="/static/js/results-free.js"></script>
</body>
</html>
