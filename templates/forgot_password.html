<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - WEX Theory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0a; --bg-card:#111111; --border:#222222; --text:#ffffff; --text-muted:#666666; --btn-bg:#ffffff; --btn-text:#0a0a0a; --wrong:#ef4444; --correct:#22c55e; }
    [data-theme="light"] { --bg:#ffffff; --bg-card:#f5f5f5; --border:#e0e0e0; --text:#0a0a0a; --text-muted:#666666; --btn-bg:#0a0a0a; --btn-text:#ffffff; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-wrap{width:100%;max-width:420px}.logo-wrap{text-align:center;margin-bottom:32px}.logo{font-weight:800;font-size:1.5rem;letter-spacing:-0.04em;color:var(--text);text-decoration:none}.logo-sub{color:var(--text-muted);font-size:.88rem;margin-top:6px}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:36px 32px}.card-title{font-size:1.3rem;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}.card-sub{color:var(--text-muted);font-size:.88rem;margin-bottom:24px;line-height:1.7}
    .form-group{margin-bottom:16px}label{display:block;font-size:.82rem;color:var(--text-muted);font-weight:500;margin-bottom:6px}input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;width:100%;font-family:inherit;font-size:.9rem;outline:none}input:focus{border-color:var(--text-muted)}input::placeholder{color:var(--text-muted)}
    .msg-box{padding:12px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}.msg-box.error{background:#1a0505;color:var(--wrong);border:1px solid var(--wrong);display:block}.msg-box.success{background:#052e16;color:var(--correct);border:1px solid var(--correct);display:block}
    .btn-primary{width:100%;background:var(--btn-bg);color:var(--btn-text);padding:12px 24px;border-radius:8px;font-weight:600;border:none;cursor:pointer;font-size:.95rem;font-family:inherit;transition:opacity .15s}.btn-primary:hover{opacity:.85}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .footer-link{text-align:center;margin-top:18px;font-size:.88rem;color:var(--text-muted)} .footer-link a{color:var(--text);text-decoration:underline}
    .theme-toggle{position:fixed;top:16px;right:16px;background:none;border:1px solid var(--border);padding:6px 10px;border-radius:6px;color:var(--text);cursor:pointer;font-size:1rem;line-height:1;font-family:inherit}
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeBtn">☀️</button>
  <div class="auth-wrap">
    <div class="logo-wrap">
      <a href="/" class="logo">WEXTheory</a>
      <p class="logo-sub">Danish Driving Theory Practice</p>
    </div>
    <div class="card">
      <div class="card-title">Reset your password</div>
      <div class="card-sub">Enter your account email and we'll send you a secure reset link and backup code.</div>
      <div class="msg-box" id="msgBox"></div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus>
      </div>
      <button class="btn-primary" id="btn">Send Reset Email</button>
    </div>
    <div class="footer-link">Remembered your password? <a href="/login">Back to sign in</a></div>
  </div>

  <script src="/static/js/forgot-password.js"></script>
</body>
</html>
