<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - WEX Theory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0a; --bg-card:#111111; --border:#222222; --text:#ffffff; --text-muted:#666666; --btn-bg:#ffffff; --btn-text:#0a0a0a; --wrong:#ef4444; --correct:#22c55e; }
    [data-theme="light"] { --bg:#ffffff; --bg-card:#f5f5f5; --border:#e0e0e0; --text:#0a0a0a; --text-muted:#666666; --btn-bg:#0a0a0a; --btn-text:#ffffff; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-wrap{width:100%;max-width:420px}.logo-wrap{text-align:center;margin-bottom:32px}.logo{font-weight:800;font-size:1.5rem;letter-spacing:-0.04em;color:var(--text);text-decoration:none}.logo-sub{color:var(--text-muted);font-size:.88rem;margin-top:6px}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:36px 32px}.card-title{font-size:1.3rem;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}.card-sub{color:var(--text-muted);font-size:.88rem;margin-bottom:24px;line-height:1.7}
    .form-group{margin-bottom:16px}label{display:block;font-size:.82rem;color:var(--text-muted);font-weight:500;margin-bottom:6px}input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;width:100%;font-family:inherit;font-size:.9rem;outline:none}input:focus{border-color:var(--text-muted)}input::placeholder{color:var(--text-muted)}
    .password-wrap{position:relative}.password-wrap input{padding-right:48px}.password-toggle{position:absolute;top:50%;right:12px;transform:translateY(-50%);border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.95rem;line-height:1;padding:4px}.password-toggle:hover{color:var(--text)}
    .msg-box{padding:12px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}.msg-box.error{background:#1a0505;color:var(--wrong);border:1px solid var(--wrong);display:block}.msg-box.success{background:#052e16;color:var(--correct);border:1px solid var(--correct);display:block}
    .btn-primary{width:100%;background:var(--btn-bg);color:var(--btn-text);padding:12px 24px;border-radius:8px;font-weight:600;border:none;cursor:pointer;font-size:.95rem;font-family:inherit;transition:opacity .15s}.btn-primary:hover{opacity:.85}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .footer-link{text-align:center;margin-top:18px;font-size:.88rem;color:var(--text-muted)} .footer-link a{color:var(--text);text-decoration:underline}
    .hint{margin-top:6px;font-size:.78rem;color:var(--text-muted);line-height:1.5}
    .theme-toggle{position:fixed;top:16px;right:16px;background:none;border:1px solid var(--border);padding:6px 10px;border-radius:6px;color:var(--text);cursor:pointer;font-size:1rem;line-height:1;font-family:inherit}
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
  <div class="auth-wrap">
    <div class="logo-wrap">
      <a href="/" class="logo">WEXTheory</a>
      <p class="logo-sub">Danish Driving Theory Practice</p>
    </div>
    <div class="card">
      <div class="card-title">Set a new password</div>
      <div class="card-sub">Choose a fresh password for your account. The reset link and code expire after 10 minutes.</div>
      <div class="msg-box" id="msgBox"></div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="code">Reset code</label>
        <input type="text" id="code" placeholder="Enter the 6-digit code" inputmode="numeric" maxlength="6">
      </div>
      <div class="form-group">
        <label for="password">New password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="At least 8 chars, letters + numbers" autocomplete="new-password">
          <button type="button" class="password-toggle" id="passwordToggle" onclick="togglePassword('password','passwordToggle')" aria-label="Show password">👁</button>
        </div>
        <div class="hint">Use at least 8 characters with one letter and one number.</div>
      </div>
      <button class="btn-primary" id="btn" onclick="handleResetPassword()">Update Password</button>
    </div>
    <div class="footer-link"><a href="/forgot-password">Request a new reset email</a></div>
    <div class="footer-link" style="margin-top:10px;">Back to <a href="/login">sign in</a></div>
  </div>

  <script>
  (function(){
    const t = localStorage.getItem('wex-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
    const params = new URLSearchParams(window.location.search);
    document.getElementById('email').value = params.get('email') || '';
    document.getElementById('code').value = params.get('code') || '';
    const error = params.get('error') || '';
    if (error) showMsg(error, 'error');
  })();
  function toggleTheme(){ const h=document.documentElement; const next=h.getAttribute('data-theme')==='dark'?'light':'dark'; h.setAttribute('data-theme',next); localStorage.setItem('wex-theme',next); document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙'; }
  function showMsg(msg,type){ const box=document.getElementById('msgBox'); box.className='msg-box '+type; box.textContent=msg; }
  function getCookieValue(name){ const value=`; ${document.cookie}`; const parts=value.split(`; ${name}=`); return parts.length===2 ? parts.pop().split(';').shift() : ''; }
  function csrfFetch(url, options = {}) {
    const opts = { ...options };
    const method = String(opts.method || 'GET').toUpperCase();
    const headers = new Headers(opts.headers || {});
    if (!['GET','HEAD','OPTIONS'].includes(method)) {
      const token = getCookieValue('csrf_token');
      if (token) headers.set('X-CSRF-Token', token);
      if (!opts.credentials) opts.credentials = 'same-origin';
    }
    opts.headers = headers;
    return fetch(url, opts);
  }
  function togglePassword(inputId, buttonId){ const input=document.getElementById(inputId); const button=document.getElementById(buttonId); if(!input || !button) return; const show=input.type==='password'; input.type=show?'text':'password'; button.textContent=show?'🙈':'👁'; button.setAttribute('aria-label', show ? 'Hide password' : 'Show password'); }
  async function handleResetPassword() {
    const btn=document.getElementById('btn');
    const email=document.getElementById('email').value.trim();
    const code=document.getElementById('code').value.trim();
    const password=document.getElementById('password').value;
    if(!email || !code || !password){ showMsg('Please fill all fields', 'error'); return; }
    if(password.length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password)){ showMsg('Password must be at least 8 characters and include a letter and number', 'error'); return; }
    btn.disabled=true; btn.textContent='Updating...';
    try{
      const res=await csrfFetch('/api/auth/reset-password',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({email, code, password})});
      const data=await res.json();
      if(data.success){ window.location.href = data.redirect || '/login?reset=1'; }
      else{ showMsg(data.error || 'Could not reset password', 'error'); }
    } catch(e){ showMsg('Connection error', 'error'); }
    btn.disabled=false; btn.textContent='Update Password';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleResetPassword(); });
  </script>
</body>
</html>
