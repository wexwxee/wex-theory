services:
  - type: web
    name: wex-theory
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python import_exam_wording.py --all; uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: wex-theory-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: wex-theory-db
    databaseName: wex_theory
    plan: free
